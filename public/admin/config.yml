backend:
  name: github
  repo: enginbeyazgul/enginbeyazgul.github.io
  branch: main # Branch to update

# This enables the "Save" and "Publish" workflow instead of immediate publishing
publish_mode: simple

media_folder: "public/img"
public_folder: "/img"

collections:
  - name: "profile"
    label: "Profil Bilgileri"
    folder: "src/content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    files:
      - file: "src/content/profile.json"
        label: "Kişisel Profil"
        name: "profile"
        fields:
          - {label: "Ad Soyad", name: "name", widget: "string"}
          - {label: "Ünvan", name: "title", widget: "string"}
          - {label: "Hakkımda", name: "bio", widget: "text"}
          - {label: "Profil Fotoğrafı", name: "imageUrl", widget: "image"}
          - label: "Sosyal Medya Linkleri"
            name: "socialLinks"
            widget: "list"
            fields:
              - {label: "Platform", name: "platform", widget: "select", options: ["instagram", "linkedin", "github", "medium"]}
              - {label: "URL", name: "url", widget: "string"}
